name: Update Disposable Email Blocklist

on:
  schedule:
    # Run on the 1st of every month at 00:00 UTC
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      reason:
        description: Optional reason for running a manual blocklist update
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update-blocklist:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: false

      - name: Set up Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Download latest blocklist
        run: |
          curl -s https://raw.githubusercontent.com/disposable-email-domains/disposable-email-domains/main/disposable_email_blocklist.conf -o disposable_email_blocklist.conf

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet disposable_email_blocklist.conf; then
            echo "No changes detected"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Run tests
        if: steps.check_changes.outputs.has_changes == 'true'
        run: go test -v

      - name: Create Pull Request
        id: create_pr
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.BLOCKLIST_UPDATE_TOKEN || secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update disposable email blocklist'
          title: 'chore: update disposable email blocklist'
          body: |
            ## 🤖 Automated Blocklist Update

            This PR updates the disposable email blocklist with the latest domains from the upstream repository.

            ### Changes
            - Updated `disposable_email_blocklist.conf` with the latest disposable email domains
            - Source: https://github.com/disposable-email-domains/disposable-email-domains
            - Trigger: `${{ github.event_name }}`
            - Manual reason: `${{ github.event.inputs.reason || 'n/a' }}`

            ### Testing
            ✅ All tests passed successfully

            ---
            *This PR was automatically created by the [Update Blocklist workflow](.github/workflows/update-blocklist.yml)*
          branch: update-blocklist-${{ github.run_id }}
          delete-branch: true
          labels: |
            automated
            dependencies

      - name: Explain required repo setting for PR creation
        if: steps.check_changes.outputs.has_changes == 'true' && steps.create_pr.outcome == 'failure'
        run: |
          echo "::error::PR creation failed. Configure one of these options and re-run the workflow:"
          echo "::error::1) Repository Settings -> Actions -> General -> Workflow permissions -> enable 'Allow GitHub Actions to create and approve pull requests'."
          echo "::error::2) Add a repository secret named BLOCKLIST_UPDATE_TOKEN with a PAT that has 'contents:write' and 'pull_requests:write' permissions."
          exit 1
